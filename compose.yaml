services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: bookingserver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookingserver"]
      interval: 5s
      timeout: 5s
      retries: 12